<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinesh K</title>

    <style>
        body{

            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;

        .card{

            padding:40px;

        h1{

        a{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#38bdf8;
            color:#000;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        a:hover{
            background:white;
        }
    </style>

<body>

<div class="card">
    <h1>Hello 👋</h1>
